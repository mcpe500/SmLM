# SmolLM2-360M to 180M Conservative Student

# Student architecture - conservative compression
student_config:
  num_hidden_layers: 12
  num_attention_heads: 12
  hidden_size: 768
  intermediate_size: 3072

# Teacher model
teacher:
  name_or_path: HuggingFaceTB/SmolLM2-360M

# Distillation hyperparameters
distillation:
  temperature: 2.0
  alpha_kd: 0.6
  alpha_ce: 0.4

# Training hyperparameters
training:
  learning_rate: 3e-5
  batch_size: 12
  gradient_accumulation_steps: 4
  num_epochs: 8
  warmup_steps: 2000
  max_grad_norm: 1.0

# Dataset
dataset:
  name: wikitext
  config: wikitext-2-raw-v1
  max_seq_len: 512
  num_samples: 10000

# Checkpointing
checkpoint:
  save_steps: 5000
  logging_steps: 100

# Output
output:
  dir: checkpoints
  run_tag: smollm2-180m-v1
