# Student architecture - minimal test config
student_config:
  num_hidden_layers: 2
  num_attention_heads: 4
  hidden_size: 128
  intermediate_size: 512

# Teacher model (use GPT-2 for minimal test)
teacher:
  name_or_path: gpt2

# Distillation hyperparameters
distillation:
  temperature: 2.0
  alpha_kd: 0.7
  alpha_ce: 0.3

# Training hyperparameters
training:
  learning_rate: 1e-4
  batch_size: 16
  gradient_accumulation_steps: 2
  num_epochs: 1
  warmup_steps: 100
  max_grad_norm: 1.0

# Dataset (synthetic for minimal test)
dataset:
  name: synthetic
  max_seq_len: 64
  num_samples: 200

# Checkpointing
checkpoint:
  save_steps: 50
  logging_steps: 10

# Output
output:
  dir: checkpoints
  run_tag: minimal-test
