# SmolLM2-360M to 30M Aggressive Student

# Student architecture - aggressive compression
student_config:
  num_hidden_layers: 4
  num_attention_heads: 4
  hidden_size: 384
  intermediate_size: 1536

# Teacher model
teacher:
  name_or_path: HuggingFaceTB/SmolLM2-360M

# Distillation hyperparameters
distillation:
  temperature: 3.0
  alpha_kd: 0.8
  alpha_ce: 0.2

# Training hyperparameters
training:
  learning_rate: 8e-5
  batch_size: 32
  gradient_accumulation_steps: 2
  num_epochs: 15
  warmup_steps: 500
  max_grad_norm: 1.0

# Dataset
dataset:
  name: wikitext
  config: wikitext-2-raw-v1
  max_seq_len: 256
  num_samples: 15000

# Checkpointing
checkpoint:
  save_steps: 2000
  logging_steps: 50

# Output
output:
  dir: checkpoints
  run_tag: smollm2-30m-v1
